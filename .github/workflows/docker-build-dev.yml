name: Docker Build and Push Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ghcr.io/${{ vars.GHCR_OWNER != '' && vars.GHCR_OWNER || github.repository_owner }}/riven-multi-debrid-queue-orchestrator-backend

jobs:
  build-and-push-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.2

    - name: Docker Setup QEMU
      uses: docker/setup-qemu-action@v3
      id: qemu
      with:
        platforms: amd64,arm64

    - name: Log into ghcr.io registry
      uses: docker/login-action@v3.1.0
      with:
        registry: ghcr.io
        username: ${{ vars.GHCR_OWNER != '' && vars.GHCR_OWNER || github.repository_owner }}
        password: ${{ secrets.GHCR_PUBLISH_TOKEN != '' && secrets.GHCR_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.2.0

    - name: Build Docker Metadata
      id: docker-metadata
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY_IMAGE }}
        flavor: |
          latest=auto
        tags: |
          type=ref,event=branch
          type=sha,commit=${{ github.sha }}
          type=raw,value=dev,enable={{is_default_branch}}

    - name: Push Dev Image to repo
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        provenance: mode=max
        tags: ${{ steps.docker-metadata.outputs.tags }}
        labels: ${{ steps.docker-metadata.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha,scope=${{ github.workflow }}
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}
