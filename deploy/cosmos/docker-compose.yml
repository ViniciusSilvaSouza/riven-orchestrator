services:
  riven:
    image: ${RIVEN_IMAGE:-ghcr.io/example/riven-orchestrator:main}
    container_name: riven
    restart: unless-stopped
    tty: true
    shm_size: 1g
    ports:
      - "${RIVEN_PORT:-8080}:8080"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Sao_Paulo}
      ORIGIN: ${RIVEN_ORIGIN:-http://localhost:8080}
      RIVEN_FORCE_ENV: "true"
      RIVEN_DATABASE_HOST: postgresql+psycopg2://${RIVEN_POSTGRES_USER:-postgres}:${RIVEN_POSTGRES_PASSWORD:-postgres}@riven-postgres:5432/${RIVEN_POSTGRES_DB:-riven}
      SETTINGS_FILENAME: ${SETTINGS_FILENAME:-settings.json}
      API_KEY: ${API_KEY:-}
      RIVEN_DEBUG: ${RIVEN_DEBUG:-INFO}
      RIVEN_FILESYSTEM_MOUNT_PATH: ${RIVEN_FILESYSTEM_MOUNT_PATH:-/mount}
      RIVEN_LIBRARY_PATH: ${RIVEN_LIBRARY_PATH:-/mount}
      RIVEN_DOWNLOADERS_REAL_DEBRID_ENABLED: ${RIVEN_DOWNLOADERS_REAL_DEBRID_ENABLED:-false}
      RIVEN_DOWNLOADERS_REAL_DEBRID_API_KEY: ${RIVEN_DOWNLOADERS_REAL_DEBRID_API_KEY:-}
      RIVEN_JELLYFIN_ENABLED: ${RIVEN_JELLYFIN_ENABLED:-false}
      RIVEN_JELLYFIN_URL: ${RIVEN_JELLYFIN_URL:-http://jellyfin:8096}
      RIVEN_JELLYFIN_API_KEY: ${RIVEN_JELLYFIN_API_KEY:-}
      RIVEN_CONTENT_OVERSEERR_ENABLED: ${RIVEN_CONTENT_OVERSEERR_ENABLED:-false}
      RIVEN_CONTENT_OVERSEERR_URL: ${RIVEN_CONTENT_OVERSEERR_URL:-http://seerr:5055}
      RIVEN_CONTENT_OVERSEERR_API_KEY: ${RIVEN_CONTENT_OVERSEERR_API_KEY:-}
      RIVEN_CONTENT_OVERSEERR_USE_WEBHOOK: ${RIVEN_CONTENT_OVERSEERR_USE_WEBHOOK:-false}
      RIVEN_SCRAPING_PROWLARR_ENABLED: ${RIVEN_SCRAPING_PROWLARR_ENABLED:-false}
      RIVEN_SCRAPING_PROWLARR_URL: ${RIVEN_SCRAPING_PROWLARR_URL:-http://prowlarr:9696}
      RIVEN_SCRAPING_PROWLARR_API_KEY: ${RIVEN_SCRAPING_PROWLARR_API_KEY:-}
      RIVEN_SCRAPING_ZILEAN_ENABLED: ${RIVEN_SCRAPING_ZILEAN_ENABLED:-false}
      RIVEN_SCRAPING_ZILEAN_URL: ${RIVEN_SCRAPING_ZILEAN_URL:-http://zilean:8181}
      RIVEN_SCRAPING_TORRENTIO_ENABLED: ${RIVEN_SCRAPING_TORRENTIO_ENABLED:-false}
      RIVEN_SCRAPING_TORRENTIO_URL: ${RIVEN_SCRAPING_TORRENTIO_URL:-http://torrentio.strem.fun}
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${RIVEN_DATA_DIR:-./data/riven}:/riven/data
      - ${RIVEN_MOUNT_DIR:-./mount}:/mount:rshared
    depends_on:
      riven-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - media

  riven-postgres:
    image: postgres:17-alpine
    container_name: riven-postgres
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${RIVEN_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${RIVEN_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${RIVEN_POSTGRES_DB:-riven}
    volumes:
      - ${RIVEN_DB_DIR:-./data/postgres}:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RIVEN_POSTGRES_USER:-postgres} -d ${RIVEN_POSTGRES_DB:-riven}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ${JELLYFIN_CONFIG_DIR:-./data/jellyfin/config}:/config
      - ${JELLYFIN_CACHE_DIR:-./data/jellyfin/cache}:/cache
      - ${RIVEN_MOUNT_DIR:-./mount}:/mount:rslave
    depends_on:
      riven:
        condition: service_started
    networks:
      - media

  seerr:
    image: sctx/overseerr:latest
    container_name: seerr
    restart: unless-stopped
    ports:
      - "${SEERR_PORT:-5055}:5055"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      LOG_LEVEL: ${SEERR_LOG_LEVEL:-info}
      PORT: 5055
    volumes:
      - ${SEERR_CONFIG_DIR:-./data/seerr}:/app/config
    networks:
      - media

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ${PROWLARR_CONFIG_DIR:-./data/prowlarr}:/config
    networks:
      - media

  zilean:
    image: ${ZILEAN_IMAGE:-ipromknight/zilean:latest}
    container_name: zilean
    restart: unless-stopped
    tty: true
    ports:
      - "${ZILEAN_PORT:-8181}:8181"
    environment:
      Zilean__Database__ConnectionString: Host=zilean-postgres;Port=5432;Database=${ZILEAN_POSTGRES_DB:-zilean};Username=${ZILEAN_POSTGRES_USER:-postgres};Password=${ZILEAN_POSTGRES_PASSWORD:-postgres};Timeout=300;CommandTimeout=3600;
    volumes:
      - ${ZILEAN_DATA_DIR:-./data/zilean}:/app/data
    depends_on:
      zilean-postgres:
        condition: service_healthy
    networks:
      - media

  zilean-postgres:
    image: postgres:17-alpine
    container_name: zilean-postgres
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${ZILEAN_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${ZILEAN_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${ZILEAN_POSTGRES_DB:-zilean}
    volumes:
      - ${ZILEAN_DB_DIR:-./data/zilean-postgres}:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZILEAN_POSTGRES_USER:-postgres} -d ${ZILEAN_POSTGRES_DB:-zilean}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media

networks:
  media:
    name: ${STACK_NETWORK_NAME:-riven-media}
